<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">IEDEP</div>

    <nav>
      <a class="active">📂 Documentos</a>
      <a>📊 Reportes</a>
      <a>⚙️ Configuración</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <header class="header">
      <h1>Gestor Documental</h1>
      <div class="user">
        <span id="nombreUsuario"></span>
        <button onclick="logout()">Salir</button>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <div class="toolbar">
        <button class="btn-primary" onclick="subirArchivo()">+ Subir Documento</button>
        <input type="text" placeholder="Buscar documento..." onkeyup="buscar(this.value)">
      </div>

      <div class="table-container">
        <table id="tablaDocs">
          <thead>
            <tr>
              <th>Documento</th>
              <th>Área</th>
              <th>Versión</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </section>

  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
