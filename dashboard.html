<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Gestor Documental IEDEP</title>
</head>

<body>

<div class="layout">

  <!-- 🔥 SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">IEDEP</div>
  </aside>

  <!-- 🔥 MAIN -->
  <div class="main">

    <!-- 🔥 HEADER -->
    <div class="header">
      <h1>Gestor Documental</h1>
      <div class="user">
        <span id="nombreUsuario"></span>
        <button onclick="logout()">Salir</button>
      </div>
    </div>

    <!-- 🔥 CONTENT -->
    <div class="content">

      <!-- 🔥 BREADCRUMB -->
      <div class="breadcrumb">
        <span onclick="irRaiz()">🏠 Inicio</span> / 
        <span id="ruta">Documentos</span>
      </div>

      <!-- 🔥 BARRA DE ACCIONES -->
      <div class="acciones-bar">

        <button class="btn-primary" onclick="nuevaCarpeta()">+ Nueva carpeta</button>

        <div class="upload-group">
          <input type="file" id="fileInput" hidden>
          <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Seleccionar archivo</button>
          <span id="fileName">Ningún archivo seleccionado</span>
          <button class="btn-success" onclick="subir()">Subir</button>
        </div>

        <!-- 🔥 LOADER LOCAL -->
        <div id="loader" class="loader hidden"></div>

      </div>

      <!-- 🔥 EXPLORADOR -->
      <div id="explorador" class="grid"></div>

      <!-- 🔥 DRAG & DROP -->
      <div id="dropZone" class="drop-zone hidden">
        <div class="drop-content">⬇ Suelta el archivo aquí</div>
      </div>

    </div>

  </div>

</div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast"></div>

<!-- ✅ ÚNICO LOADER GLOBAL (CORRECTO) -->
<div id="globalLoader" class="global-loader hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Cargando información...</p>
  </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
