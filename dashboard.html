<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Gestor Documental IEDEP</title>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">IEDEP</div>
    <nav id="menu"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h1 id="tituloModulo">Documentos</h1>

      <div class="user">
        <span id="nombreUsuario"></span>
        <button onclick="logout()">Salir</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- BREADCRUMB -->
      <div class="breadcrumb">
        <span onclick="irRaiz()">🏠 Inicio</span> /
        <span id="ruta">Documentos</span>
      </div>

      <!-- ACCIONES -->
      <div class="acciones-bar">

        <button class="btn-primary" id="btnNuevaCarpeta" onclick="nuevaCarpeta()">
          + Carpeta
        </button>

        <input 
          type="text" 
          id="buscador"
          placeholder="🔍 Buscar archivos..." 
          oninput="buscar(this.value)"
        >

        <select onchange="filtrarTipo(this.value)">
          <option value="todos">Todos</option>
          <option value="carpeta">Carpetas</option>
          <option value="pdf">PDF</option>
          <option value="imagen">Imágenes</option>
          <option value="video">Videos</option>
        </select>

        <button onclick="cambiarVista()">
          🔄 Vista
        </button>

        <div class="upload-group">
          <input type="file" id="fileInput" hidden>

          <button onclick="document.getElementById('fileInput').click()">
            Seleccionar
          </button>

          <span id="fileName">Ningún archivo</span>

          <button class="btn-success" onclick="subir()">
            Subir
          </button>
        </div>

        <!-- LOADER LOCAL -->
        <div id="loader" class="loader hidden"></div>

      </div>

      <!-- EXPLORADOR -->
      <div id="contenedor" class="grid"></div>

    </div>
  </div>

</div>

<!-- DRAG & DROP -->
<div id="dropZone" class="drop-zone hidden">
  <div class="drop-content">
    ⬇ Suelta el archivo aquí
  </div>
</div>

<!-- 🔥 MODAL PREVIEW (ÚNICO Y CORREGIDO) -->
<div id="previewModal" class="modal hidden">
  <div class="modal-content preview-box">

    <div class="preview-header">
      <span>Vista previa</span>
      <button onclick="cerrarPreview()">✖</button>
    </div>

    <iframe id="previewFrame"></iframe>

  </div>
</div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast"></div>

<!-- 🔥 MODAL ELIMINAR -->
<div id="confirmModal" class="modal hidden">
  <div class="modal-content confirm-box">
    <h3>🗑️ Eliminar elemento</h3>
    <p id="confirmText">
      ¿Estás seguro de enviar este elemento a la papelera?
    </p>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarConfirm()">Cancelar</button>
      <button class="btn-danger" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<!-- 🔥 LOADER GLOBAL -->
<div id="globalLoader" class="global-loader hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</div>

<!-- 🔥 MODAL NOTA -->
<div id="modalNota" class="modal hidden">
  <div class="modal-content nota-box">

    <h3>📝 Agregar nota</h3>

    <textarea id="notaTexto" placeholder="Escribe una observación..." rows="4"></textarea>

    <div class="modal-actions">
      <button class="btn-primary" onclick="guardarNotaArchivo()">Guardar</button>
      <button class="btn-secondary" onclick="cerrarModalNota()">Cancelar</button>
    </div>

  </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
