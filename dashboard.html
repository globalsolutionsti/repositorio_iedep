<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">IEDEP</div>
  </aside>

  <div class="main">

    <div class="header">
      <h1>Gestor Documental</h1>
      <div class="user">
        <span id="nombreUsuario"></span>
        <button onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="content">

      <!-- 🔥 BREADCRUMB -->
      <div class="breadcrumb">
        <span onclick="irRaiz()">🏠 Inicio</span> /
        <span id="ruta">Documentos</span>
      </div>

      <!-- 🔥 NUEVA BARRA PRO -->
      <div class="acciones-bar">

        <button class="btn-primary" onclick="nuevaCarpeta()">
          + Nueva carpeta
        </button>

        <div class="upload-group">
          <input type="file" id="fileInput" hidden>

          <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">
            Seleccionar archivo
          </button>

          <span id="fileName">Ningún archivo seleccionado</span>

          <button class="btn-success" onclick="subir()">
            Subir
          </button>
        </div>

        <!-- 🔥 LOADER -->
        <div id="loader" class="loader hidden"></div>

      </div>

      <!-- 🔥 EXPLORADOR -->
      <div id="explorador" class="grid"></div>
       
      <div id="dropZone" class="drop-zone hidden">
  <div class="drop-content">
    ⬇ Suelta el archivo aquí
  </div>
</div>
      
    </div>

  </div>

</div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast"></div>

<script src="js/dashboard.js"></script>

<div id="globalLoader" class="global-loader hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Cargando información...</p>
  </div>
</div>

  
</body>
</html>
