<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">IEDEP</div>
  </aside>

  <div class="main">

    <!-- ✅ SOLO UN HEADER -->
    <div class="header">
      <h1>Gestor Documental</h1>
      <div class="user">
        <span id="nombreUsuario"></span>
        <button onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="content">

      <div class="breadcrumb">
        <span onclick="irRaiz()">🏠 Inicio</span> /
        <span id="ruta">Documentos</span>
      </div>

      <div class="toolbar">
        <button onclick="nuevaCarpeta()">📁 Nueva Carpeta</button>
        <input type="file" id="fileInput">
        <button onclick="subir()">⬆ Subir</button>
      </div>

      <div id="explorador" class="grid"></div>

    </div>

  </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
